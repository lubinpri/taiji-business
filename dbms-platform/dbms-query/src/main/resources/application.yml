server:
  port: 8082

spring:
  application:
    name: dbms-query
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        file-extension: yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dbms_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.dbms.query.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.dbms.query: debug
    com.dbms.common: info

# 服务调用配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
      dbms-permission:
        connectTimeout: 5000
        readTimeout: 10000
      dbms-mask:
        connectTimeout: 5000
        readTimeout: 5000
      dbms-watermark:
        connectTimeout: 5000
        readTimeout: 5000
