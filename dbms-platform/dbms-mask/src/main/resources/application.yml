server:
  port: 8084

spring:
  application:
    name: dbms-mask
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dbms_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.dbms.mask.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 脱敏配置
mask:
  # 默认密钥 (实际使用时应从配置中心读取)
  encrypt-key: dbms-mask-secret-key-2024
  # 哈希盐值
  hash-salt: dbms-mask-hash-salt
