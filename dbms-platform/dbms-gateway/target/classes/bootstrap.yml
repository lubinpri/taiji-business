spring:
  application:
    name: dbms-gateway
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        group: DBMS_GROUP
        file-extension: yml
        refresh-enabled: true
        # 共享配置
        shared-configs:
          - data-id: common.yml
            group: DBMS_GROUP
            refresh: true
