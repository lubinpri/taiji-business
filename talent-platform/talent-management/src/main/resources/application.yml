server:
  port: 8091

spring:
  application:
    name: talent-management
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:talent_management
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
